version: '3.8'

services:
  landing-page:
    build: .
    container_name: bourpi-landing-page
    ports:
      - "80:80"
    restart: always
    environment:
      - TZ=America/Bogota
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
